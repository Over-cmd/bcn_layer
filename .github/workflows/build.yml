name: Compilar Winlator con tu bcn_layer empaquetado como wrapper.tzst

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite activar el proceso manualmente con un botón

jobs:
  build-and-inject:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo de tu repositorio local
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Instalar herramientas Java y de compresion binaria
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk apksigner zip unzip wget zstd

    - name: "PASO 1: Descargar tu binario bcn_layer de Pipetto"
      run: |
        mkdir -p bcn_package/usr/lib
        mkdir -p bcn_package/usr/share/vulkan/icd.d
        
        # Extraemos el binario estable de bcn_layer de Pipetto
        wget https://github.com -O bcn_package/usr/lib/libvulkan_wrapper.so

    - name: "PASO 2: Introducir ICD plano apuntando a tu bcn_layer"
      run: |
        cat <<EOF > bcn_package/usr/share/vulkan/icd.d/pipetto_unisoc_icd.json
        {
          "ICD": {
            "api_version": "1.1.128",
            "library_path": "libvulkan_wrapper.so"
          },
          "file_format_version": "1.0.0"
        }
        EOF

    - name: "PASO 3: Crear el manifiesto meta.json regulador"
      run: |
        cat <<EOF > bcn_package/meta.json
        {
          "name": "Pipetto BCN - Unisoc T618 Build",
          "version": "7.0.0",
          "author": "Pipetto & Unisoc Mod",
          "description": "Capa BCN original empaquetada como wrapper.tzst. Optimizado para Mali-G52, fuerza Vulkan 1.1 y transcodifica a ASTC.",
          "driverType": "VulkanWrapper",
          "environment": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "BCN_TRANSCODE_TARGET": "ASTC",
            "MALI_TEXTURE_QUALITY": "LOW",
            "IGNORE_VULKAN_1_2_EXTENSIONS": "1",
            "FORCE_VULKAN_1_1_SPOOF": "1",
            "VK_ICD_FILENAMES": "usr/share/vulkan/icd.d/pipetto_unisoc_icd.json"
          }
        }
        EOF

    - name: "PASO 4: COMPILACION EN LA RAIZ: Crear tu wrapper.tzst limpio"
      run: |
        cd bcn_package
        # Usamos el comodín * desde adentro para que usr/ y meta.json queden planos en la raíz del paquete
        tar -I 'zstd -19 -T0' -cf ../wrapper.tzst *
        cd ..

    - name: "PASO 5: OBTENER BASE LIMPIA: Descargar APK Oficial de Winlator"
      run: |
        wget -L https://github.com -O base.apk

    - name: "PASO 6: SUSTITUCION DIRECTA: Inyectar tu wrapper.tzst recien creado"
      run: |
        # Creamos las carpetas de recursos internos exigidas por el menu de Winlator
        mkdir -p assets/graphics_drivers
        mkdir -p assets/graphics-drivers
        
        # Copiamos tu archivo empaquetado en las rutas de la GPU de la APK
        cp wrapper.tzst assets/graphics_drivers/wrapper.tzst
        cp wrapper.tzst assets/graphics-drivers/wrapper.tzst
        
        # Forzamos la actualizacion/sobreescritura de los assets dentro de la APK binaria
        zip -ur base.apk assets/

    - name: Generar Firma Digital Automatizada para Android
      run: |
        keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
          -alias my-alias -storepass android -keypass android -dname "CN=UnisocMod, OU=Dev, O=Winlator, L=ES, S=ES, C=ES"

    - name: Firmar la APK Modificada con apksigner
      run: |
        apksigner sign --ks my-release-key.jks --ks-pass pass:android --out Winlator_UnisocT618_Final.apk base.apk

    - name: Publicar y guardar tu nueva APK terminada para descargar
      uses: actions/upload-artifact@v4
      with:
        name: Winlator-Ludashi-BCN-Final-APK
        path: Winlator_UnisocT618_Final.apk
