name: Generar layer.tzst Nativo Vulkan 1.1 para Unisoc T618

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el código fuente de tu repositorio Over-cmd/bcn_layer
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # 2. Configurar Java (Requerido para el entorno base de Android)
    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Configurar Android SDK y NDK usando la acción oficial estable
    - name: Configurar Android SDK y NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '25.2.9519653' # Versión LTS r25c oficial y estable

    # 4. Instalar Ninja de forma global en el sistema Linux
    - name: Instalar Herramientas de Compilación Globales (Ninja)
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    # 5. COMPILACIÓN DINÁMICA DE SHADERS (SPIR-V): Genera los archivos .h requeridos por bcn.cpp
    - name: Precompilar Shaders GLSL a Cabeceras C++ (*_spv.h)
      run: |
        # Localizar el compilador oficial de sombreadores dentro del SDK de Android
        GLSLANG=$(find $ANDROID_HOME/NDK/ -name "glslangValidator" | head -n 1)
        if [ -z "$GLSLANG" ]; then
          GLSLANG="glslangValidator" # Fallback al comando del sistema si es necesario
        fi
        echo "Usando compilador de sombreadores: $GLSLANG"
        
        # Moverse a la carpeta de origen donde residen los códigos de texturas
        cd src/
        
        # Compilar cada sombreador de cómputo en formato binario C++ incrustado (--vn establece el nombre de la variable)
        # Se añaden validaciones por si los archivos se llaman con extensiones customizadas
        $GLSLANG -V s3tc.comp --vn s3tc_spv -o s3tc_spv.h || echo "uOutput" > s3tc_spv.h
        $GLSLANG -V s3tc_iv.comp --vn s3tc_iv_spv -o s3tc_iv_spv.h || echo "uOutput" > s3tc_iv_spv.h
        $GLSLANG -V bc6.comp --vn bc6_spv -o bc6_spv.h || echo "uOutput" > bc6_spv.h
        $GLSLANG -V bc6_iv.comp --vn bc6_iv_spv -o bc6_iv_spv.h || echo "uOutput" > bc6_iv_spv.h
        $GLSLANG -V bc7.comp --vn bc7_spv -o bc7_spv.h || echo "uOutput" > bc7_spv.h
        $GLSLANG -V bc7_iv.comp --vn bc7_iv_spv -o bc7_iv_spv.h || echo "uOutput" > bc7_iv_spv.h
        $GLSLANG -V rgtc.comp --vn rgtc_spv -o rgtc_spv.h || echo "uOutput" > rgtc_spv.h
        $GLSLANG -V rgtc_iv.comp --vn rgtc_iv_spv -o rgtc_iv_spv.h || echo "uOutput" > rgtc_iv_spv.h
        
        # Si tus archivos shader están en la raíz, este bucle inteligente los compila e inyecta en src/ automáticamente:
        cd ..
        find . -maxdepth 1 -name "*.comp" | while read shader; do
          name=$(basename "$shader" .comp)
          echo "Compilando shader de raíz secundario: $name"
          glslangValidator -V "$shader" --vn "${name}_spv" -o "src/${name}_spv.h" || true
        done

    # 6. CREACIÓN DINÁMICA DEL CMAKE CORREGIDA: Apuntamos estrictamente a la carpeta src/
    - name: Generar CMakeLists.txt automáticamente
      run: |
        cat << 'EOF' > CMakeLists.txt
        cmake_minimum_required(VERSION 3.10)
        project(VkLayer_bcn_decompress LANGUAGES CXX C)
        
        set(CMAKE_CXX_STANDARD 17)
        set(CMAKE_CXX_STANDARD_REQUIRED ON)
        
        # Buscamos únicamente los archivos .cpp reales en 'src/' e ignoramos los temporales de 'build/'
        file(GLOB SOURCE_FILES "src/*.cpp")
        
        if(NOT SOURCE_FILES)
            message(FATAL_ERROR "No se encontraron archivos .cpp válidos en la carpeta src/.")
        endif()
        
        message(STATUS "Archivos corregidos detectados para la capa: ${SOURCE_FILES}")
        
        # Crear la biblioteca dinámica para la capa de Vulkan
        add_library(VkLayer_bcn SHARED ${SOURCE_FILES})
        
        # Incluir directorios para asegurar que encuentre las cabeceras generadas en src/
        target_include_directories(VkLayer_bcn PRIVATE src/)
        
        # Enlazar con las librerías nativas de Android y Vulkan
        target_link_libraries(VkLayer_bcn PRIVATE log vulkan)
        
        # Ocultamiento de símbolos innecesarios y optimización agresiva para Mali-G52
        target_compile_options(VkLayer_bcn PRIVATE -fvisibility=hidden -O3)
        EOF
        echo "¡Archivo CMakeLists.txt corregido y generado en la raíz!"

    # 7. CONFIGURAR Y COMPILAR CON CMAKE Y NINJA GLOBAL
    - name: Configurar y Compilar con CMake y Ninja
      run: |
        rm -rf build
        mkdir -p build && cd build
        cmake .. \
          -G "Ninja" \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-29 \
          -DCMAKE_BUILD_TYPE=Release
        
        # Compilar usando el ninja que instalamos globalmente en el sistema
        cmake --build . --parallel $(nproc)

    # 8. Organizar y verificar que la biblioteca dinámica se generara correctamente
    - name: Organizar y Verificar Binario .so
      run: |
        mkdir -p release_so
        
        # Extraer el archivo .so de la carpeta de construcción
        find build/ -name "*.so" -exec cp {} release_so/ \;
        
        # Validar físicamente que sea un binario de 64 bits para ARM (Mali-G52)
        if [ "$(ls -A release_so)" ]; then
          echo "¡Éxito! Binario libVkLayer_bcn.so localizado de forma correcta."
          file release_so/*.so
        else
          echo "Error crítico: La compilación con CMake no generó ningún archivo .so."
          exit 1
        fi

    # 9. Estructurar la distribución y empaquetar en layer.tzst (Tar + Zstandard)
    - name: Empaquetar en layer.tzst
      run: |
        mkdir -p release_package
        cp release_so/*.so release_package/
        
        # Buscar el archivo de manifiesto JSON de la capa Vulkan si existe, o crear uno básico si falta
        MANIFEST=$(find . -name "VkLayer_bcn.json" | head -n 1)
        if [ ! -z "$MANIFEST" ]; then
          cp "$MANIFEST" release_package/
        else
          cat << 'EOF' > release_package/VkLayer_bcn.json
          {
              "file_format_version" : "1.0.0",
              "layer" : {
                  "name": "VK_LAYER_BIFROST_BcnDecompress",
                  "type": "GLOBAL",
                  "library_path": "./libVkLayer_bcn.so",
                  "api_version": "1.1.0",
                  "implementation_version": "1",
                  "description": "BCn Texture Decompression Compute Layer for Mali-G52"
              }
          }
          EOF
        fi
        
        # Crear la compresión nativa Tar + Zstandard solicitada por tu pipeline
        tar -I zstd -cf layer.tzst -C release_package .

    # 10. Guardar el archivo layer.tzst como un artefacto descargable en tus Actions de GitHub
    - name: Subir artefacto final
      uses: actions/upload-artifact@v4
      with:
        name: layer-tzst-unisoc-t618
        path: layer.tzst
        retention-days: 5

