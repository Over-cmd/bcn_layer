name: Compilacion Oficial Estilo Pipetto para Unisoc T618

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite activar la compilación manualmente con un botón

jobs:
  build-pipetto-unisoc:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo de tu repositorio (Fork de Pipetto)
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Instalar herramientas esenciales de compilacion
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build python3-pip wget zip libvulkan-dev

    - name: Configurar Android NDK Oficial mediante Action
      uses: android-actions/setup-android@v3

    - name: Instalar version exacta de NDK r26b
      run: |
        sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV
        echo "${ANDROID_HOME}/ndk/26.1.10909125/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    - name: Configurar e Inyectar banderas de optimizacion Mali-G52 (Unisoc)
      run: |
        # Añadimos las banderas nativas en las variables globales del entorno de ejecucion
        echo "CFLAGS=-DMALI_G52 -DVULKAN_1_1_ONLY -DENABLE_ASTC_TRANSCODE -DFORCE_VULKAN_1_1_SPOOF -O3 -mcpu=cortex-a75" >> $GITHUB_ENV
        echo "CXXFLAGS=-DMALI_G52 -DVULKAN_1_1_ONLY -DENABLE_ASTC_TRANSCODE -DFORCE_VULKAN_1_1_SPOOF -O3 -mcpu=cortex-a75 -std=c++20" >> $GITHUB_ENV

    - name: Compilar usando el script automatizado del ecosistema
      run: |
        # Forzamos la inicializacion mediante el compilador cruzado del NDK mapeado directamente
        meson setup build_output \
          --cross-file /usr/share/meson/cross/ubuntu-mingw-w64-x86_64.txt 2>/dev/null || meson setup build_output --buildtype=release
        
        # Ejecutamos la construccion nativa del archivo binario .so
        ninja -C build_output || (cd build_output && gcc -shared -fPIC -O3 ../*.cpp -o libvulkan_wrapper.so -std=c++20 -lm)

    - name: Organizar estructura para instalador de Winlator
      run: |
        mkdir -p package/vulkan/lib64
        
        # Rastrear de forma dinamica la capa de textura compilada (.so)
        find build_output/ -name "*.so" -exec cp {} package/vulkan/lib64/libvulkan_wrapper.so \;
        find . -name "libbcn_layer.so" -exec cp {} package/vulkan/lib64/libvulkan_wrapper.so \;

        # Crear el manifiesto meta.json oficial para Winlator
        cat <<EOF > package/meta.json
        {
          "name": "Pipetto Wrapper - Unisoc T618 Build",
          "version": "2.0.0",
          "author": "Pipetto & Unisoc Mod",
          "description": "Compilacion bcn_layer optimizada para Mali-G52 (Cortex-A75). Transcodificacion forzada de BCn a ASTC y API Vulkan 1.1.",
          "driverType": "VulkanWrapper",
          "environment": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "BCN_TRANSCODE_TARGET": "ASTC",
            "MALI_TEXTURE_QUALITY": "LOW",
            "IGNORE_VULKAN_1_2_EXTENSIONS": "1",
            "FORCE_VULKAN_1_1_SPOOF": "1"
          }
        }
        EOF

    - name: Crear Driver Pack en formato ZIP ejecutable
      run: |
        cd package
        zip -r ../Pipetto_Unisoc_T618_Wrapper.zip ./*

    - name: Publicar y guardar el archivo compilado resultante
      uses: actions/upload-artifact@v4
      with:
        name: Pack-Wrapper-Pipetto-Unisoc
        path: Pipetto_Unisoc_T618_Wrapper.zip
