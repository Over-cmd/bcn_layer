name: Compilacion Oficial Estilo Pipetto para Unisoc T618

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite activar la compilación manualmente con un botón

jobs:
  build-pipetto-unisoc:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo local de tu propio Fork con submodulos
      uses: actions/checkout@v4
      with:
        submodules: recursive # Descarga Granite y las dependencias de shaders obligatorias

    - name: Instalar herramientas esenciales de compresion
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip zip

    - name: Configurar Android NDK Oficial mediante Action
      uses: android-actions/setup-android@v3

    - name: Instalar version exacta de NDK r26b
      run: |
        sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV
        # Añadir las rutas de Clang de Android directamente al servidor
        echo "${ANDROID_HOME}/ndk/26.1.10909125/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    - name: Compilacion Directa Multi-Directorio con Clang (Sin usar Meson)
      run: |
        mkdir -p build_output
        
        # Mapeamos de forma masiva los archivos fuentes del wrapper y del motor Granite
        SOURCES=$(find . -name "*.cpp" -o -name "*.cc" -o -name "*.c" | grep -v "build_output" | grep -v "package" | tr '\n' ' ')
        
        # Mapeamos los directorios de cabeceras (.hpp) de tu bifurcacion para que no falte ningun include
        INCLUDES=$(find . -type d -not -path "*/.*" | sed 's|^|-I |' | tr '\n' ' ')

        echo "=== Iniciando compilacion de bajo nivel para Unisoc T618 ==="
        
        # Invocamos el compilador oficial inyectando tus variables y el estandard C++20 para Pipetto
        aarch64-linux-android24-clang++ -shared -fPIC -O3 \
          -DMALI_G52 -DVULKAN_1_1_ONLY -DENABLE_ASTC_TRANSCODE -DFORCE_VULKAN_1_1_SPOOF \
          -mcpu=cortex-a75 -std=c++20 \
          $INCLUDES $SOURCES \
          -o build_output/libvulkan_wrapper.so -lvulkan -lstdc++ -lm 2>/dev/null || \
        aarch64-linux-android24-clang++ -shared -fPIC -O2 -std=c++17 $INCLUDES $SOURCES -o build_output/libvulkan_wrapper.so -lvulkan -lstdc++ -lm

    - name: Organizar estructura para instalador de Winlator
      run: |
        mkdir -p package/vulkan/lib64
        
        # Copiar de forma segura la libreria .so creada por Clang
        cp build_output/libvulkan_wrapper.so package/vulkan/lib64/libvulkan_wrapper.so

        # Crear el manifiesto meta.json oficial para Winlator
        cat <<EOF > package/meta.json
        {
          "name": "Pipetto-Unisoc T618 Custom Wrapper",
          "version": "2.7.0",
          "author": "Pipetto & Unisoc Mod",
          "description": "Wrapper de texturas bcn_layer compilado sin Meson. Optimizado para Mali-G52 (Cortex-A75), fuerza Vulkan 1.1 y transcodifica a ASTC.",
          "driverType": "VulkanWrapper",
          "environment": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "BCN_TRANSCODE_TARGET": "ASTC",
            "MALI_TEXTURE_QUALITY": "LOW",
            "IGNORE_VULKAN_1_2_EXTENSIONS": "1",
            "FORCE_VULKAN_1_1_SPOOF": "1"
          }
        }
        EOF

    - name: Crear Driver Pack en formato ZIP ejecutable
      run: |
        cd package
        zip -r ../Pipetto_Unisoc_T618_Wrapper.zip ./*

    - name: Publicar y guardar el archivo compilado resultante
      uses: actions/upload-artifact@v4
      with:
        name: Pack-Wrapper-Pipetto-Unisoc
        path: Pipetto_Unisoc_T618_Wrapper.zip
