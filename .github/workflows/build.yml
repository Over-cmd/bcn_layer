name: Generar layer.tzst Nativo Vulkan 1.1 para Unisoc T618

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite compilar a mano con un botón

jobs:
  build-layer:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código de tu repositorio
      uses: actions/checkout@v4

    - name: Instalar herramientas del sistema y Zstd
      run: |
        sudo apt-get update
        sudo apt-get install -y wget zip zstd

    - name: Crear árbol de directorios estándar Linux
      run: |
        mkdir -p package/usr/lib
        mkdir -p package/usr/share/vulkan/icd.d

    - name: Extraer binario de Khronos y tu código modificado
      run: |
        # 1. Descargamos la capa oficial de Khronos de 64 bits para Android (el puente)
        wget https://github.com -O khronos.tar.gz
        tar -xzf khronos.tar.gz
        cp android-binaries-v1.3.261/arm64-v8a/libVkLayer_khronos_validation.so package/usr/lib/
        
        # 2. Copia aquí tu archivo de biblioteca modificado (.so) del BCn Layer si ya lo tienes en el repositorio.
        # Asegúrate de que tu binario termine dentro de: package/usr/lib/

    - name: Crear Manifiesto de Capa Vulkan (wrapper_icd_aarch64.json)
      run: |
        cat <<EOF > package/usr/share/vulkan/icd.d/wrapper_icd_aarch64.json
        {
          "file_format_version": "1.0.0",
          "layer": {
            "name": "VK_LAYER_KHRONOS_validation",
            "type": "GLOBAL",
            "library_path": "libVkLayer_khronos_validation.so",
            "api_version": "1.1.128",
            "implementation_version": "1",
            "description": "BCN Layer Mod Vulkan 1.1 - Unisoc T618"
          }
        }
        EOF

    - name: Crear Regulador de Entorno Especial para Mali (meta.json)
      run: |
        cat <<EOF > package/meta.json
        {
          "nombre": "BCN Layer Vulkan 1.1 (Unisoc T618)",
          "versión": "1.1.0",
          "autor": "Usuario Mod (Pippetocrypto base)",
          "description": "Capa modificada para transcodificación BCn a ASTC optimizada para Mali-G52.",
          "driverType": "VulkanWrapper",
          "ambiente": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "VK_ICD_FILENAMES": "/usr/share/vulkan/icd.d/wrapper_icd_aarch64.json",
            "VK_INSTANCE_LAYERS": "VK_LAYER_KHRONOS_validation",
            "MESA_VK_IGNORE_CONFORMANCE_WARNINGS": "1",
            "DXVK_FILTER_DEVICE_NAME": "Mali"
          }
        }
        EOF

    - name: Comprimir contenido plano en formato nativo TZST
      run: |
        cd package
        # Comprimimos directamente el contenido plano usando zstd de nivel 19
        tar -I 'zstd -19 -T0' -cf ../layer.tzst *
        cd ..

    - name: Guardar layer.tzst en la carpeta de assets de tu repositorio
      run: |
        mkdir -p app/src/main/assets/graphics_driver
        cp layer.tzst app/src/main/assets/graphics_driver/layer.tzst
        
        # El bot guarda de forma automática el archivo comprimido final en tu repositorio
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add app/src/main/assets/graphics_driver/layer.tzst
        git commit -m "Actualización automatizada de layer.tzst puro para Mali-G52" || echo "No hay cambios que guardar"
        git push
        
        # Si tienes tu binario libvulkan_wrapper.so en otra ruta, asegúrate de que esté en package/usr/lib/

    - name: "INTRODUCIR ICD: Crear el manifiesto JSON con soporte de Capa"
      run: |
        cat <<EOF > package/usr/share/vulkan/icd.d/wrapper_icd_aarch64.json
        {
          "file_format_version": "1.0.0",
          "layer": {
            "name": "VK_LAYER_KHRONOS_validation",
            "type": "GLOBAL",
            "library_path": "libVkLayer_khronos_validation.so",
            "api_version": "1.1.128",
            "implementation_version": "1",
            "description": "Khronos Vulkan Validation Layer para BCN Unisoc T618"
          }
        }
        EOF

    - name: Crear el archivo meta.json Regulador de Entorno
      run: |
        cat <<EOF > package/meta.json
        {
          "nombre": "BCN Layer - Unisoc T618 Vulkan 1.1 Fixed",
          "versión": "1.1.0",
          "autor": "Usuario Mod & Khronos",
          "description": "Wrapper personalizado con inyección de Khronos Validation Layer para GPU Mali-G52.",
          "driverType": "VulkanWrapper",
          "ambiente": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "VK_ICD_FILENAMES": "/usr/share/vulkan/icd.d/wrapper_icd_aarch64.json",
            "VK_INSTANCE_LAYERS": "VK_LAYER_KHRONOS_validation",
            "MESA_VK_IGNORE_CONFORMANCE_WARNINGS": "1",
            "DXVK_FILTER_DEVICE_NAME": "Mali"
          }
        }
        EOF

    - name: "COMPILACION DEL NUEVO wrapper.tzst"
      run: |
        cd package
        tar -I 'zstd -19 -T0' -cf ../wrapper.tzst *
        cd ..

    # Este paso guarda el nuevo wrapper.tzst directamente dentro de las carpetas de tu repositorio
    - name: Guardar wrapper.tzst actualizado en el repositorio
      run: |
        mkdir -p app/src/main/assets/graphics_driver
        cp wrapper.tzst app/src/main/assets/graphics_driver/wrapper.tzst
        
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add app/src/main/assets/graphics_driver/wrapper.tzst
        git commit -m "Actualizar wrapper.tzst con Khronos Validation Layer para Mali GPU" || echo "No hay cambios que confirmar"
        git push
