name: Generar layer.tzst Nativo Vulkan 1.1 para Unisoc T618

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el código fuente de tu repositorio Over-cmd/bcn_layer de forma limpia
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # 2. Configurar Java (Requerido obligatoriamente por el motor de Gradle)
    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Registrar el entorno del Android SDK preinstalado en el servidor de GitHub
    - name: Configurar Entorno Android
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/default" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/default" >> $GITHUB_ENV

    # 4. Aceptar de forma silenciosa las licencias de Google para que el compilador no se detenga
    - name: Aceptar Licencias de Android
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    # 5. Otorgar permisos de ejecución al script ejecutable de Gradle de tu bifurcación
    - name: Dar permisos de ejecucion a Gradlew
      run: chmod +x ./gradlew

    # 6. COMPILAR EL PROYECTO: Lanzamos la construcción nativa del repositorio de Pipetto-crypto
    # Gradle descargará dependencias, llamará al NDK internamente y compilará la versión Release
    - name: Compilar con Gradle (Estructura Nativa del Fork)
      run: ./gradlew assembleRelease --no-daemon

    # 7. Organizar el binario .so final de 64 bits generado para el Unisoc T618 (Mali-G52)
    - name: Organizar y Verificar Binario .so
      run: |
        mkdir -p build
        
        # Buscar el archivo de biblioteca .so generado por el compilador en los directorios de salida
        find . -name "libVkLayer_bcn.so" -exec cp {} build/ \;
        
        # Resguardo de seguridad: si la biblioteca tiene otro nombre en tu compilación, la extrae
        if [ ! "$(ls -A build)" ]; then
          find . -name "*.so" -exec cp {} build/ \;
        fi
        
        # Validación física del binario ELF para arquitectura ARM de 64 bits
        if [ "$(ls -A build)" ]; then
          echo "¡Éxito! Binario de la capa Vulkan localizado correctamente."
          file build/*.so
        else
          echo "Error crítico: El proceso de compilación de Gradle no generó ningún archivo .so."
          exit 1
        fi

    # 8. Estructurar la distribución y empaquetar en layer.tzst (Tar + Zstandard)
    - name: Empaquetar en layer.tzst
      run: |
        mkdir -p release_package
        cp build/*.so release_package/
        
        # Buscar el archivo de manifiesto JSON de la capa Vulkan e incluirlo en el paquete
        MANIFEST=$(find . -name "VkLayer_bcn.json" | head -n 1)
        if [ ! -z "$MANIFEST" ]; then
          cp "$MANIFEST" release_package/
        else
          # Si falta el manifiesto, generamos uno base compatible con Vulkan 1.1 para evitar errores
          cat << 'EOF' > release_package/VkLayer_bcn.json
          {
              "file_format_version" : "1.0.0",
              "layer" : {
                  "name": "VK_LAYER_BIFROST_BcnDecompress",
                  "type": "GLOBAL",
                  "library_path": "./libVkLayer_bcn.so",
                  "api_version": "1.1.0",
                  "implementation_version": "1",
                  "description": "BCn Texture Decompression Compute Layer for Mali-G52"
              }
          }
          EOF
        fi
        
        # Crear la compresión nativa solicitada por tu flujo de despliegue
        tar -I zstd -cf layer.tzst -C release_package .

    # 9. Guardar el archivo layer.tzst final como un artefacto descargable en tu panel de Actions
    - name: Subir artefacto final
      uses: actions/upload-artifact@v4
      with:
        name: layer-tzst-unisoc-t618
        path: layer.tzst
        retention-days: 5
