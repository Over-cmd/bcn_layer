name: Empaquetar Wrapper Oficial Pipetto con Soporte ICD y TZST para Unisoc T618

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite activar el empaquetado manualmente con un botón

jobs:
  package-tzst-wrapper:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo de tu repositorio
      uses: actions/checkout@v4

    - name: Instalar herramientas esenciales y compresor Zstd
      run: |
        sudo apt-get update
        sudo apt-get install -y wget zip zstd

    - name: Crear la estructura estricta de carpetas dentro de USR
      run: |
        # Creamos la carpeta de librerias dinámicas dentro de usr/ para cumplir el estándar Linux
        mkdir -p package/usr/lib
        # Creamos la ruta estricta del sistema donde el emulador busca los archivos ICD
        mkdir -p package/usr/share/vulkan/icd.d

    - name: Extraer Binario Oficial Precompilado de Pipetto (32/64 cross)
      run: |
        # Descargamos el binario .so estable directo en la ruta usr/lib/libvulkan_wrapper.so que solicitaste
        wget https://github.com -O package/usr/lib/libvulkan_wrapper.so

    - name: "INTRODUCIR ICD: Crear el archivo manifiesto JSON para Vulkan"
      run: |
        # Creamos el manifiesto ICD apuntando de forma estricta a la nueva ruta usr/lib/
        cat <<EOF > package/usr/share/vulkan/icd.d/pipetto_unisoc_icd.json
        {
          "ICD": {
            "api_version": "1.1.128",
            "library_path": "usr/lib/libvulkan_wrapper.so"
          },
          "file_format_version": "1.0.0"
        }
        EOF

    - name: Crear el archivo meta.json Regulador de Entorno
      run: |
        cat <<EOF > package/meta.json
        {
          "name": "Pipetto Wrapper - Unisoc T618 USR Build",
          "version": "5.0.0",
          "author": "Pipetto & Unisoc Mod",
          "description": "Wrapper oficial con inyeccion de Manifiesto ICD nativo unificado en USR. Optimizado para Mali-G52, fuerza Vulkan 1.1 y transcodifica a ASTC.",
          "driverType": "VulkanWrapper",
          "environment": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "BCN_TRANSCODE_TARGET": "ASTC",
            "MALI_TEXTURE_QUALITY": "LOW",
            "IGNORE_VULKAN_1_2_EXTENSIONS": "1",
            "FORCE_VULKAN_1_1_SPOOF": "1",
            "VK_ICD_FILENAMES": "usr/share/vulkan/icd.d/pipetto_unisoc_icd.json"
          }
        }
        EOF

    - name: Comprimir el paquete completo en formato nativo TZST para Winlator
      run: |
        cd package
        # Empaquetamos meta.json y la carpeta estructural usr/ en un .tzst limpio
        tar -I 'zstd -19 -T0' -cf ../container_pattern.tzst ./*
        cd ..

    - name: Crear contenedor final ZIP para la descarga de GitHub
      run: |
        zip -r Pipetto_Unisoc_T618_ICD_Pack.zip container_pattern.tzst

    - name: Publicar y guardar el archivo comprimido resultante
      uses: actions/upload-artifact@v4
      with:
        name: Pack-Wrapper-Pipetto-Unisoc-ICD-TZST
        path: Pipetto_Unisoc_T618_ICD_Pack.zip
