name: Generar layer.tzst Nativo Vulkan 1.1 para Unisoc T618

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el código fuente de tu repositorio Over-cmd/bcn_layer
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # 2. Configurar Java (Mandatorio para compilar con Gradle en Android)
    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Configurar el Android SDK y el NDK automáticamente
    - name: Configurar Android SDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '25.2.9519653'

    # 4. Dar permisos de ejecución al script de Gradle local
    - name: Dar permisos a Gradlew
      run: chmod +x ./gradlew

    # 5. Compilar el proyecto usando la tarea nativa de Gradle
    # Esto compilará el código C++ y generará el archivo .so para arm64-v8a de forma automática
    - name: Compilar con Gradle (CMake nativo de Android)
      run: ./gradlew assembleRelease --no-daemon

    # 6. Organizar el binario .so final de 64 bits para el Unisoc T618
    - name: Organizar y Verificar Binario .so
      run: |
        mkdir -p build
        
        # Buscar el archivo .so en las carpetas de salida estándar de Gradle/NDK
        find . -name "libVkLayer_bcn.so" -exec cp {} build/ \;
        
        # Fallback por si la biblioteca tiene otro nombre en tu fork
        if [ ! "$(ls -A build)" ]; then
          find . -name "*.so" -exec cp {} build/ \;
        fi
        
        # Validación física del binario para la GPU Mali-G52
        if [ "$(ls -A build)" ]; then
          echo "¡Éxito! Binario localizado de forma correcta en el árbol."
          file build/*.so
        else
          echo "Error: El proceso de compilación no generó ningún archivo de biblioteca .so."
          exit 1
        fi

    # 7. Estructurar la carpeta de distribución y generar el archivo layer.tzst comprimido
    - name: Empaquetar en layer.tzst
      run: |
        mkdir -p release
        cp build/*.so release/
        
        # Copiar el manifiesto JSON de la capa de Vulkan buscando en todo el repositorio
        find . -name "VkLayer_bcn.json" -exec cp {} release/ \;
        
        # Crear la compresión nativa Tar + Zstandard solicitada por tu pipeline
        tar -I zstd -cf layer.tzst -C release .

    # 8. Subir el archivo empaquetado final a la interfaz de tus GitHub Actions
    - name: Subir artefacto final
      uses: actions/upload-artifact@v4
      with:
        name: layer-tzst-unisoc-t618
        path: layer.tzst
        retention-days: 5
