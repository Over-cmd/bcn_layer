name: Empaquetar Wrapper Oficial Pipetto para Unisoc T618

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite activar el empaquetado manualmente con un botón

jobs:
  package-wrapper:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo de tu repositorio
      uses: actions/checkout@v4

    - name: Instalar herramientas de compresion
      run: |
        sudo apt-get update
        sudo apt-get install -y wget zip

    - name: Descargar Binarios Oficiales Precompilados por Pipetto (Evita errores de compilacion)
      run: |
        mkdir -p package/vulkan/lib64
        
        # Descargamos directamente el binario .so estable compilado por el autor desde su repositorio oficial de Winlator
        wget https://github.com -O package/vulkan/lib64/libvulkan_wrapper.so || \
        wget https://github.com -O package/vulkan/lib64/libvulkan_wrapper.so

    - name: Crear el Manifiesto meta.json Optimizado para tu Unisoc T618
      run: |
        # Creamos el archivo de configuración que obliga a Winlator a usar el wrapper en modo Vulkan 1.1 y ASTC
        cat <<EOF > package/meta.json
        {
          "name": "Pipetto Wrapper - Unisoc T618 Build",
          "version": "2.8.0",
          "author": "Pipetto & Unisoc Mod",
          "description": "Wrapper oficial de Pipetto-crypto optimizado para Mali-G52 (Cortex-A75). Fuerza Vulkan 1.1, transcodifica BCn a ASTC por hardware y optimiza texturas.",
          "driverType": "VulkanWrapper",
          "environment": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "BCN_TRANSCODE_TARGET": "ASTC",
            "MALI_TEXTURE_QUALITY": "LOW",
            "IGNORE_VULKAN_1_2_EXTENSIONS": "1",
            "FORCE_VULKAN_1_1_SPOOF": "1"
          }
        }
        EOF

    - name: Crear el Driver Pack en formato ZIP para Winlator
      run: |
        cd package
        zip -r ../Pipetto_Unisoc_T618_Wrapper.zip ./*

    - name: Publicar y guardar el archivo comprimido resultante
      uses: actions/upload-artifact@v4
      with:
        name: Pack-Wrapper-Pipetto-Unisoc
        path: Pipetto_Unisoc_T618_Wrapper.zip
