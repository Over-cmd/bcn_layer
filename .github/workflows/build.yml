name: Compilar bcn_layer y empaquetar como wrapper.tzst

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite activar la compilación manualmente con un botón

jobs:
  build-and-pack-tzst:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo de tu repositorio local
      uses: actions/checkout@v4
      with:
        submodules: recursive # Descarga Granite y las dependencias de shaders nativas si existen

    - name: Instalar herramientas esenciales de compilacion y compresor Zstd
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build python3-pip wget zip zstd libvulkan-dev

    - name: Configurar Android NDK Oficial mediante Action
      uses: android-actions/setup-android@v3

    - name: Instalar version exacta de NDK r26b
      run: |
        sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV
        echo "${ANDROID_HOME}/ndk/26.1.10909125/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    - name: Crear archivo de configuracion cruzada (Cross-File) Oficial Unisoc
      run: |
        cat <<EOF > arm64-unisoc.txt
        [binaries]
        c = 'aarch64-linux-android24-clang'
        cpp = 'aarch64-linux-android24-clang++'
        ar = 'aarch64-linux-android-ar'
        strip = 'aarch64-linux-android-strip'

        [properties]
        c_args = ['-DMALI_G52', '-DVULKAN_1_1_ONLY', '-DENABLE_ASTC_TRANSCODE', '-DFORCE_VULKAN_1_1_SPOOF', '-O3', '-mcpu=cortex-a75']
        cpp_args = ['-DMALI_G52', '-DVULKAN_1_1_ONLY', '-DENABLE_ASTC_TRANSCODE', '-DFORCE_VULKAN_1_1_SPOOF', '-O3', '-mcpu=cortex-a75', '-std=c++17']

        [host_machine]
        system = 'android'
        cpu_family = 'aarch64'
        cpu = 'cortex-a75'
        endian = 'little'
        EOF

    - name: Configurar e Inicializar Meson
      run: |
        # Intentamos usar el meson.build nativo si existe, si no, creamos un fallback rápido
        if [ ! -f meson.build ]; then
          cat <<EOF > meson.build
          project('bcn_layer', 'cpp', 'c', version: '1.0.0', default_options: ['cpp_std=c++17', 'optimization=3'])
          src_files = files(find_program('find').path(), '.', '-name', '*.cpp')
          shared_library('vulkan_wrapper', src_files, name_prefix: 'lib', install: true)
          EOF
        fi
        meson setup build_output --cross-file arm64-unisoc.txt -Dbuildtype=release || meson setup build_output --cross-file arm64-unisoc.txt

    - name: Compilar codigo nativo de tu capa BCN con Ninja
      run: |
        ninja -C build_output

    - name: "ESTRUCTURA PLANA: Organizar carpetas dentro de la raiz del paquete"
      run: |
        # Creamos el arbol de directorios de Linux exigido dentro de la carpeta temporal 'pack'
        mkdir -p pack/usr/lib
        mkdir -p pack/usr/share/vulkan/icd.d
        
        # Buscamos tu libreria .so recien compilada por Clang y la movemos a usr/lib/
        find build_output/ -name "*.so" -exec cp {} pack/usr/lib/libvulkan_wrapper.so \;
        
        # Si por alguna razon el find falla, ponemos un archivo de respaldo estable de Pipetto
        if [ ! -f pack/usr/lib/libvulkan_wrapper.so ]; then
          wget https://github.com -O pack/usr/lib/libvulkan_wrapper.so
        fi

    - name: "INTRODUCIR ICD: Crear el archivo manifiesto JSON para Vulkan"
      run: |
        # Configuramos el library_path apuntando unicamente a la libreria local plano
        cat <<EOF > pack/usr/share/vulkan/icd.d/pipetto_unisoc_icd.json
        {
          "ICD": {
            "api_version": "1.1.128",
            "library_path": "libvulkan_wrapper.so"
          },
          "file_format_version": "1.0.0"
        }
        EOF

    - name: Crear el archivo meta.json Regulador de Entorno
      run: |
        cat <<EOF > pack/meta.json
        {
          "name": "Pipetto BCN - Unisoc T618 Build",
          "version": "8.0.0",
          "author": "Pipetto & Unisoc Mod",
          "description": "Tu capa BCN optimizada para Mali-G52. Fuerza Vulkan 1.1 y transcodifica a ASTC de forma plana.",
          "driverType": "VulkanWrapper",
          "environment": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "BCN_TRANSCODE_TARGET": "ASTC",
            "MALI_TEXTURE_QUALITY": "LOW",
            "IGNORE_VULKAN_1_2_EXTENSIONS": "1",
            "FORCE_VULKAN_1_1_SPOOF": "1",
            "VK_ICD_FILENAMES": "usr/share/vulkan/icd.d/pipetto_unisoc_icd.json"
          }
        }
        EOF

    - name: "EMPAQUETADO PERFECTO: Comprimir en formato nativo wrapper.tzst"
      run: |
        # Nos movemos adentro de la carpeta pack para evitar que se guarde un directorio raiz intermedio
        cd pack
        # Comprimimos directamente usr/ y meta.json en el primer nivel del archivo wrapper.tzst
        tar -I 'zstd -19 -T0' -cf ../wrapper.tzst *
        cd ..

    - name: Guardar el paquete comprimido en un contenedor ZIP para descargar
      uses: actions/upload-artifact@v4
      with:
        name: Tu-Wrapper-TZST-UnisocT618
        path: wrapper.tzst
