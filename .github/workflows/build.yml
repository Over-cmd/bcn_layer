name: Empaquetar Wrapper Oficial Pipeta con Soporte ICD y TZST para Unisoc T618

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite activar el empaquetado manualmente con un botón

jobs:
  paquete-tzst-wrapper:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código de tu repositorio
      uses: actions/checkout@v4

    - name: Instalar herramientas esenciales y compresor Zstd
      run: |
        sudo apt-get update
        sudo apt-get install -y wget zip zstd

    - name: Crear la estructura estricta de carpetas dentro de USR
      run: |
        # Creamos la carpeta de librerías dinámicas dentro de usr/ para cumplir el estándar Linux
        mkdir -p package/usr/lib
        # Creamos la ruta estricta del sistema cambiando al nuevo nombre que solicitaste
        mkdir -p package/usr/share/vulkan/icd.d

    - name: Extraer Binario Oficial Precompilado de Pipetto (32/64 cross)
      run: |
        # Descargamos el binario .so estable directo en la ruta usr/lib/libvulkan_wrapper.so
        wget https://github.com -O package/usr/lib/libvulkan_wrapper.so

    - name: "INTRODUCIR ICD: Crear el archivo manifiesto JSON para Vulkan modificado"
      run: |
        # Configuramos el Library_path apuntando a libvulkan_wrapper.so con tu nuevo nombre de archivo
        cat <<EOF > package/usr/share/vulkan/icd.d/wrapper_icd_aarch64.json
        {
          "ICD": {
            "api_version": "1.1.128",
            "library_path": "libvulkan_wrapper.so"
          },
          "file_format_version": "1.0.0"
        }
        EOF

    - name: Crear el archivo meta.json Regulador de Entorno
      run: |
        cat <<EOF > package/meta.json
        {
          "nombre": "Pipetto Wrapper - Unisoc T618 Flat Build",
          "versión": "6.0.0",
          "autor": "Pipetto & Unisoc Mod",
          "description": "Wrapper oficial con inyección de Manifiesto ICD plano en la raiz. Optimizado para Mali-G52, fuerza Vulkan 1.1 y transcodifica a ASTC.",
          "driverType": "VulkanWrapper",
          "ambiente": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "BCN_TRANSCODE_TARGET": "ASTC",
            "CALIDAD_DE_TEXTURA_MALI": "BAJA",
            "IGNORE_VULKAN_1_2_EXTENSIONS": "1",
            "FORCE_VULKAN_1_1_SPOOF": "1",
            "VK_ICD_FILENAMES": "usr/share/vulkan/icd.d/wrapper_icd_aarch64.json"
          }
        }
        EOF

    - name: "COMPILACION DIRECTA EN LA RAIZ: Comprimir en formato nativo TZST sin carpetas de por medio"
      run: |
        # Entramos a la carpeta de trabajo
        cd package
        # Comprimimos el contenido plano asignando directamente el nombre wrapper.tzst
        tar -I 'zstd -19 -T0' -cf ../wrapper.tzst *
        cd ..

    - name: Crear contenedor final ZIP para la descarga de GitHub
      run: |
        # Empaquetamos tu archivo wrapper.tzst definitivo en un ZIP compatible
        zip -r Pipetto_Unisoc_T618_ICD_Pack.zip wrapper.tzst

    - name: Publicar y guardar el archivo comprimido resultante
      uses: actions/upload-artifact@v4
      with:
        name: Pack-Wrapper-Pipetto-Unisoc-ICD-TZST
        path: Pipetto_Unisoc_T618_ICD_Pack.zip
