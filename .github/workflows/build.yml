name: Compilacion Oficial Estilo Pipetto para Unisoc T618

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite activar la compilación manualmente con un botón

jobs:
  build-pipetto-unisoc:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo local de tu propio Fork
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Instalar herramientas esenciales de compilacion
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build python3-pip wget zip

    - name: Configurar Android NDK Oficial mediante Action
      uses: android-actions/setup-android@v3

    - name: Instalar version exacta de NDK r26b
      run: |
        sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV
        echo "${ANDROID_HOME}/ndk/26.1.10909125/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    - name: Crear archivo de configuracion cruzada (Cross-File) Oficial Unisoc
      run: |
        cat <<EOF > arm64-unisoc.txt
        [binaries]
        c = 'aarch64-linux-android24-clang'
        cpp = 'aarch64-linux-android24-clang++'
        ar = 'aarch64-linux-android-ar'
        strip = 'aarch64-linux-android-strip'

        [properties]
        c_args = ['-DMALI_G52', '-DVULKAN_1_1_ONLY', '-DENABLE_ASTC_TRANSCODE', '-DFORCE_VULKAN_1_1_SPOOF', '-O3', '-mcpu=cortex-a75']
        cpp_args = ['-DMALI_G52', '-DVULKAN_1_1_ONLY', '-DENABLE_ASTC_TRANSCODE', '-DFORCE_VULKAN_1_1_SPOOF', '-O3', '-mcpu=cortex-a75', '-std=c++17']

        [host_machine]
        system = 'android'
        cpu_family = 'aarch64'
        cpu = 'cortex-a75'
        endian = 'little'
        EOF

    - name: Buscar archivos fuentes de Pipetto y Generar Meson Dinamico
      run: |
        # Buscamos de forma automatica todos los archivos .cpp en cualquier carpeta del repositorio
        # Excluimos carpetas de compilacion previas para evitar duplicados
        CPP_SOURCES=$(find . -name "*.cpp" -not -path "*/build_output/*" -not -path "*/package/*" | sed "s|^\./|'|;s|$|',|" | tr '\n' ' ')
        
        echo "Archivos de codigo detectados: $CPP_SOURCES"

        # Generamos el archivo meson.build metiendo la lista dinamica de archivos encontrados
        cat <<EOF > meson.build
        project('unisoc_wrapper', 'cpp', 'c', version: '1.0.0', default_options: ['cpp_std=c++17', 'optimization=3'])
        
        src_files = files([ $CPP_SOURCES ])
        
        add_project_arguments('-DMALI_G52', '-DVULKAN_1_1_ONLY', '-DENABLE_ASTC_TRANSCODE', '-DFORCE_VULKAN_1_1_SPOOF', language: ['c', 'cpp'])
        
        shared_library('vulkan_wrapper',
          src_files,
          name_prefix: 'lib',
          install: true
        )
        EOF

    - name: Configurar e Inicializar Meson
      run: |
        meson setup build_output --cross-file arm64-unisoc.txt -Dbuildtype=release
        
    - name: Compilar codigo nativo con Ninja
      run: |
        ninja -C build_output

    - name: Organizar estructura para instalador de Winlator
      run: |
        mkdir -p package/vulkan/lib64
        
        # Copiar de forma segura cualquier archivo .so resultante de la compilacion
        find build_output/ -name "*.so" -exec cp {} package/vulkan/lib64/libvulkan_wrapper.so \;

        # Crear el manifiesto meta.json oficial para Winlator
        cat <<EOF > package/meta.json
        {
          "name": "Pipetto-Unisoc T618 Custom Wrapper",
          "version": "2.6.0",
          "author": "Pipetto & Unisoc Mod",
          "description": "Wrapper optimizado para Mali-G52 (Cortex-A75) compilado de forma dinamica. Transcodificacion forzada de BCn a ASTC y engaño (Spoof) API Vulkan 1.1.",
          "driverType": "VulkanWrapper",
          "environment": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "BCN_TRANSCODE_TARGET": "ASTC",
            "MALI_TEXTURE_QUALITY": "LOW",
            "IGNORE_VULKAN_1_2_EXTENSIONS": "1",
            "FORCE_VULKAN_1_1_SPOOF": "1"
          }
        }
        EOF

    - name: Crear Driver Pack en formato ZIP ejecutable
      run: |
        cd package
        zip -r ../Pipetto_Unisoc_T618_Wrapper.zip ./*

    - name: Publicar y guardar el archivo compilado resultante
      uses: actions/upload-artifact@v4
      with:
        name: Pack-Wrapper-Pipetto-Unisoc
        path: Pipetto_Unisoc_T618_Wrapper.zip
