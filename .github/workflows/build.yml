    # Configurar y Compilar de forma nativa con ndk-build
    - name: Compilar con Android NDK-Build
      run: |
        # 1. Ejecutar ndk-build apuntando a la arquitectura del Unisoc T618
        $ANDROID_NDK_HOME/ndk-build \
          NDK_PROJECT_PATH=$GITHUB_WORKSPACE \
          APP_BUILD_SCRIPT=$GITHUB_WORKSPACE/Android.mk \
          APP_ABI=arm64-v8a \
          APP_PLATFORM=android-29 \
          NDK_DEBUG=0 \
          -j$(nproc)

        # 2. Crear la carpeta build para mantener compatibilidad con tus pasos de empaquetado
        mkdir -p build
        
        # 3. Mover el binario generado por ndk-build (que se guarda en libs/arm64-v8a) a build
        if [ -f "libs/arm64-v8a/libVkLayer_bcn.so" ]; then
          cp libs/arm64-v8a/libVkLayer_bcn.so build/
        elif [ -f "obj/local/arm64-v8a/libVkLayer_bcn.so" ]; then
          cp obj/local/arm64-v8a/libVkLayer_bcn.so build/
        else
          # Buscar si el archivo .so tiene otro nombre parecido en el árbol de salida
          find . -name "*.so" -exec cp {} build/ \;
        fi
