name: Generar layer.tzst Nativo Vulkan 1.1 para Unisoc T618

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar de forma limpia tu código fuente de Over-cmd/bcn_layer
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # 2. Configurar el compilador cruzado usando el NDK oficial integrado en GitHub
    - name: Configurar Entorno de Compilación
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/default" >> $GITHUB_ENV

    # 3. BÚSQUEDA INTELIGENTE Y COMPILACIÓN CON CMAKE
    # Este paso encuentra el CMakeLists.txt sin importar la carpeta en la que esté guardado
    - name: Configurar y Compilar con CMake (Búsqueda Automática)
      run: |
        # Localizar en qué subcarpeta del repositorio está el archivo de configuración real
        CMAKE_DIR=$(find . -name "CMakeLists.txt" -exec dirname {} \; | head -n 1)
        
        if [ -z "$CMAKE_DIR" ]; then
          echo "Error crítico: No se encontró ningún archivo CMakeLists.txt en todo el repositorio."
          exit 1
        fi
        
        echo "¡Archivo encontrado en la ruta!: $CMAKE_DIR"
        
        # Crear la carpeta de construcción e invocar el compilador cruzado de Android
        mkdir -p build && cd build
        cmake "$GITHUB_WORKSPACE/$CMAKE_DIR" \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/default/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-29 \
          -DCMAKE_BUILD_TYPE=Release
        
        # Compilar usando la máxima potencia del servidor
        make -j$(nproc)

    # 4. Organizar y verificar que la biblioteca dinámica se generara correctamente
    - name: Organizar y Verificar Binario .so
      run: |
        mkdir -p release_so
        
        # Extraer cualquier archivo .so que se haya compilado en el árbol de construcción
        find build/ -name "*.so" -exec cp {} release_so/ \;
        
        # Fallback de emergencia en todo el repositorio por seguridad
        if [ ! "$(ls -A release_so)" ]; then
          find . -name "*.so" -exec cp {} release_so/ \;
        fi
        
        # Validar físicamente que el archivo sea un binario de 64 bits para ARM (Mali-G52)
        if [ "$(ls -A release_so)" ]; then
          echo "¡Éxito! Binario localizado y extraído de forma correcta."
          file release_so/*.so
        else
          echo "Error: La compilación no generó ninguna biblioteca dinámica .so válida."
          exit 1
        fi

    # 5. Estructurar la distribución y empaquetar en layer.tzst (Tar + Zstandard)
    - name: Empaquetar en layer.tzst
      run: |
        mkdir -p release_package
        cp release_so/*.so release_package/
        
        # Buscar el archivo de manifiesto JSON de la capa Vulkan e incluirlo en el paquete
        find . -name "VkLayer_bcn.json" -exec cp {} release_package/ \;
        
        # Crear el archivo comprimido final solicitado por tu pipeline
        tar -I zstd -cf layer.tzst -C release_package .

    # 6. Guardar el archivo layer.tzst como un artefacto descargable en tus Actions de GitHub
    - name: Subir artefacto final
      uses: actions/upload-artifact@v4
      with:
        name: layer-tzst-unisoc-t618
        path: layer.tzst
        retention-days: 5
