name: Compilacion Oficial Estilo Pipetto para Unisoc T618

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite activar la compilación manualmente con un botón

jobs:
  build-pipetto-unisoc:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo de tu repositorio (Fork de Pipetto)
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Instalar herramientas de compresion
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip zip

    - name: Configurar Android NDK Oficial mediante Action
      uses: android-actions/setup-android@v3

    - name: Instalar version exacta de NDK r26b
      run: |
        sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.1.10909125" >> $GITHUB_ENV
        # Añadimos el compilador Clang de Android directamente al sistema
        echo "${ANDROID_HOME}/ndk/26.1.10909125/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    - name: Compilacion Directa con Clang (Sin Meson)
      run: |
        mkdir -p build_output
        
        # Rastrear todos los archivos .cpp en la raiz o en /src (se adapta a como los tenga Pipetto)
        CPP_FILES=$(find . -maxdepth 2 -name "*.cpp" | tr '\n' ' ')
        echo "Archivos encontrados para compilar: $CPP_FILES"
        
        # Ejecutamos el compilador oficial de Android inyectando tus optimizaciones nativas
        aarch64-linux-android24-clang++ -shared -fPIC -O3 \
          -DMALI_G52 -DVULKAN_1_1_ONLY -DENABLE_ASTC_TRANSCODE -DFORCE_VULKAN_1_1_SPOOF \
          -mcpu=cortex-a75 -std=c++17 \
          $CPP_FILES -o build_output/libvulkan_wrapper.so -lvulkan -lstdc++

    - name: Organizar estructura para instalador de Winlator
      run: |
        mkdir -p package/vulkan/lib64
        
        # Copiar la libreria binaria recien creada
        cp build_output/libvulkan_wrapper.so package/vulkan/lib64/libvulkan_wrapper.so

        # Crear el manifiesto meta.json oficial para Winlator
        cat <<EOF > package/meta.json
        {
          "name": "Pipetto Wrapper - Unisoc T618 Build",
          "version": "1.9.0",
          "author": "Pipetto & Unisoc Mod",
          "description": "Compilacion estilo Pipetto-crypto optimizada para Mali-G52 (Cortex-A75). Transcodificacion forzada de BCn a ASTC y API Vulkan 1.1.",
          "driverType": "VulkanWrapper",
          "environment": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "BCN_TRANSCODE_TARGET": "ASTC",
            "MALI_TEXTURE_QUALITY": "LOW",
            "IGNORE_VULKAN_1_2_EXTENSIONS": "1",
            "FORCE_VULKAN_1_1_SPOOF": "1"
          }
        }
        EOF

    - name: Crear Driver Pack en formato ZIP ejecutable
      run: |
        cd package
        zip -r ../Pipetto_Unisoc_T618_Wrapper.zip ./*

    - name: Publicar y guardar el archivo compilado resultante
      uses: actions/upload-artifact@v4
      with:
        name: Pack-Wrapper-Pipetto-Unisoc
        path: Pipetto_Unisoc_T618_Wrapper.zip
