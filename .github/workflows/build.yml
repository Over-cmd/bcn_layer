name: Actualizar wrapper.tzst con Khronos Validation Layer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  update-wrapper:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo de tu repositorio
      uses: actions/checkout@v4

    - name: Instalar herramientas esenciales y compresor Zstd
      run: |
        sudo apt-get update
        sudo apt-get install -y wget zip zstd

    - name: Crear la estructura estricta de carpetas dentro de USR
      run: |
        mkdir -p package/usr/lib
        mkdir -p package/usr/share/vulkan/icd.d

    - name: Extraer Binario de tu Wrapper y la Capa de Validación de Khronos
      run: |
        # Intentamos copiar tu wrapper existente si ya lo tenías en el repositorio, o puedes descargarlo aquí
        if [ -f "app/src/main/assets/graphics_driver/wrapper.tzst" ]; then
          tar -xf app/src/main/assets/graphics_driver/wrapper.tzst -C package/
        fi
        
        # DESCARGA CRÍTICA: Traemos el binario oficial de Khronos Validation Layer para Android AArch64
        wget https://github.com -O khronos.tar.gz
        tar -xzf khronos.tar.gz
        cp android-binaries-v1.3.261/arm64-v8a/libVkLayer_khronos_validation.so package/usr/lib/
        
        # Si tienes tu binario libvulkan_wrapper.so en otra ruta, asegúrate de que esté en package/usr/lib/

    - name: "INTRODUCIR ICD: Crear el manifiesto JSON con soporte de Capa"
      run: |
        cat <<EOF > package/usr/share/vulkan/icd.d/wrapper_icd_aarch64.json
        {
          "file_format_version": "1.0.0",
          "layer": {
            "name": "VK_LAYER_KHRONOS_validation",
            "type": "GLOBAL",
            "library_path": "libVkLayer_khronos_validation.so",
            "api_version": "1.1.128",
            "implementation_version": "1",
            "description": "Khronos Vulkan Validation Layer para BCN Unisoc T618"
          }
        }
        EOF

    - name: Crear el archivo meta.json Regulador de Entorno
      run: |
        cat <<EOF > package/meta.json
        {
          "nombre": "BCN Layer - Unisoc T618 Vulkan 1.1 Fixed",
          "versión": "1.1.0",
          "autor": "Usuario Mod & Khronos",
          "description": "Wrapper personalizado con inyección de Khronos Validation Layer para GPU Mali-G52.",
          "driverType": "VulkanWrapper",
          "ambiente": {
            "VULKAN_WRAPPER_VERSION": "1.1",
            "VK_ICD_FILENAMES": "/usr/share/vulkan/icd.d/wrapper_icd_aarch64.json",
            "VK_INSTANCE_LAYERS": "VK_LAYER_KHRONOS_validation",
            "MESA_VK_IGNORE_CONFORMANCE_WARNINGS": "1",
            "DXVK_FILTER_DEVICE_NAME": "Mali"
          }
        }
        EOF

    - name: "COMPILACION DEL NUEVO wrapper.tzst"
      run: |
        cd package
        tar -I 'zstd -19 -T0' -cf ../wrapper.tzst *
        cd ..

    # Este paso guarda el nuevo wrapper.tzst directamente dentro de las carpetas de tu repositorio
    - name: Guardar wrapper.tzst actualizado en el repositorio
      run: |
        mkdir -p app/src/main/assets/graphics_driver
        cp wrapper.tzst app/src/main/assets/graphics_driver/wrapper.tzst
        
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add app/src/main/assets/graphics_driver/wrapper.tzst
        git commit -m "Actualizar wrapper.tzst con Khronos Validation Layer para Mali GPU" || echo "No hay cambios que confirmar"
        git push
